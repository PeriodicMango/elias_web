<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#A8D1FF"/>
      <stop offset="100%" stop-color="#5B9AFF"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="220" fill="url(#bg)" filter="url(#glow)"/>
  <!-- Inner glass highlight -->
  <ellipse cx="220" cy="180" rx="100" ry="70" fill="rgba(255,255,255,0.35)"/>
  <!-- Letter "E" -->
  <text x="256" y="320" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="280" font-weight="600" fill="white" opacity="0.92">E</text>
</svg>
